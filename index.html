<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFXIV Content Unlock Checklist</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --primary: #c9a95c;
            --primary-hover: #e8cca4;
            --bg-dark: #0f1319;
            --bg-panel: rgba(25, 32, 43, 0.7);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(201, 169, 92, 0.3);
            --accent: #4f46e5;
            --glass-bg: rgba(15, 19, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        html {
            scrollbar-gutter: stable;
        }

        body {
            background: linear-gradient(135deg, #090a0f 0%, #1a1b26 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            padding: 2rem;
            position: relative;
            overflow-y: scroll;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(201, 169, 92, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-shell {
            max-width: 1520px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 1.5rem;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .sidebar-head {
            padding: 1rem 1.1rem 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            background: rgba(201, 169, 92, 0.05);
        }

        .sidebar-title {
            color: var(--primary);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .sidebar-nav {
            display: grid;
            padding: 0.75rem;
            gap: 0.55rem;
        }

        .sidebar-link {
            display: block;
            padding: 0.85rem 0.95rem;
            border-radius: 14px;
            color: var(--text-main);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.02);
            transition: border-color 0.18s ease, background-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }

        .sidebar-link:hover {
            border-color: rgba(201, 169, 92, 0.38);
            background: rgba(201, 169, 92, 0.08);
            color: #f7e4a4;
            transform: translateY(-1px);
        }

        .sidebar-link.active {
            border-color: rgba(201, 169, 92, 0.45);
            background: linear-gradient(180deg, rgba(201, 169, 92, 0.14), rgba(201, 169, 92, 0.06));
            color: #f7e4a4;
        }

        .sidebar-link-title {
            display: block;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .sidebar-link-copy {
            display: block;
            margin-top: 0.2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.45;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
            position: relative;
        }

        .header-subtitle {
            margin-top: 0.35rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            letter-spacing: 0.04em;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(201, 169, 92, 0.2);
            font-weight: 700;
        }

        .changelog-btn {
            position: absolute;
            top: 0;
            right: 0;
            padding: 6px 12px;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .progress-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            animation: fadeIn 1s ease-out;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .progress-bar-bg {
            height: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-hover));
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(201, 169, 92, 0.5);
        }

        .controls {
            display: grid;
            grid-template-columns: minmax(280px, 1fr) 290px auto;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .search-box-wrap {
            position: relative;
            min-width: 0;
        }

        .search-box {
            min-width: 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .search-box-wrap .search-box {
            width: 100%;
            padding-right: 42px;
        }
        
        select.search-box {
            flex: initial;
            min-width: 290px;
            width: 290px;
            cursor: pointer;
        }
        
        select.search-box option {
            background: #1a1b26;
            color: white;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(201, 169, 92, 0.2);
        }

        .search-clear-btn {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            padding: 0;
            border-radius: 999px;
            font-size: 0.95rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
        }

        .search-clear-btn:hover {
            color: var(--primary);
        }

        .search-clear-btn[hidden] {
            display: none;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            flex-wrap: nowrap;
            justify-content: flex-start;
        }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }

        button:hover {
            background: rgba(201, 169, 92, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .category {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .category:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(201, 169, 92, 0.2);
        }

        .category-header {
            background: rgba(201, 169, 92, 0.05);
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease;
        }

        .category-header:hover {
            background: rgba(201, 169, 92, 0.1);
        }

        .category.collapsed .category-header {
            border-bottom-color: transparent;
        }

        .category-title {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 600;
        }

        .category-stats {
            color: var(--text-muted);
            font-size: 0.9rem;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .category-body {
            display: block;
            max-height: 10000px;
            overflow: hidden;
            opacity: 1;
        }

        .category.collapsed .category-body {
            max-height: 0;
            opacity: 0;
            pointer-events: none;
        }

        .subcategory {
            border-top: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.015);
        }

        .subcategory:first-child {
            border-top: 0;
        }

        .subcategory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 0.95rem 1.5rem;
            background: rgba(255,255,255,0.025);
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
        }

        .subcategory-title {
            font-size: 1rem;
            font-weight: 600;
            color: #d6e0ee;
        }

        .subcategory-meta {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }

        .subcategory-stats {
            color: var(--text-muted);
            font-size: 0.82rem;
            background: rgba(0,0,0,0.22);
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap;
        }

        .subcategory-header-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .subcategory-toggle {
            padding: 5px 10px;
            font-size: 0.78rem;
            border-radius: 999px;
        }

        .subcategory-content {
            display: block;
        }

        .checklist {
            padding: 0;
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1px;
            background: var(--glass-border);
        }

        .checklist-item {
            background: var(--bg-panel);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .checklist-item:hover {
            background: rgba(25, 32, 43, 0.9);
        }

        .checklist-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }

        .checklist-item.completed {
            background: rgba(201, 169, 92, 0.03);
            opacity: 0.6;
        }

        .checklist-item.completed::before {
            transform: scaleY(1);
            background: #10b981;
        }

        .checkbox-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            padding-top: 3px;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background: #10b981;
            border-color: #10b981;
        }

        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 6px;
            height: 11px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            animation: checkmark 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        input[type="checkbox"]:hover {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(201, 169, 92, 0.3);
        }

        .content-info {
            flex: 1;
            min-width: 0;
        }

        .content-name {
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.4rem;
            transition: color 0.2s ease;
            display: block;
            font-size: 1.05rem;
        }

        .checklist-item.completed .content-name {
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: rgba(255,255,255,0.2);
        }

        .badges {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.type { background: rgba(79, 70, 229, 0.2); color: #a5b4fc; border: 1px solid rgba(79, 70, 229, 0.3); }
        .badge.ilvl { background: rgba(201, 169, 92, 0.15); color: #fde68a; border: 1px solid rgba(201, 169, 92, 0.3); }
        .badge.expansion { background: rgba(34, 197, 94, 0.14); color: #bbf7d0; border: 1px solid rgba(34, 197, 94, 0.22); }
        .badge.zone { background: rgba(56, 189, 248, 0.14); color: #bae6fd; border: 1px solid rgba(56, 189, 248, 0.22); }
        .badge.current { background: rgba(244, 114, 182, 0.14); color: #fbcfe8; border: 1px solid rgba(244, 114, 182, 0.22); }
        .badge.map { background: rgba(250, 204, 21, 0.14); color: #fde68a; border: 1px solid rgba(250, 204, 21, 0.22); }

        .content-quest {
            font-size: 0.85rem;
            color: var(--primary);
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .content-loc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .content-desc {
            font-size: 0.8rem;
            color: #718096;
            margin-top: 4px;
            line-height: 1.4;
        }

        .content-name a,
        .content-quest a,
        .content-loc a,
        .content-desc a {
            color: inherit;
            text-decoration: none;
            border-bottom: 1px solid rgba(201, 169, 92, 0.38);
            box-shadow: inset 0 -1px 0 rgba(201, 169, 92, 0.14);
            transition: color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
            word-break: break-word;
        }

        .content-name a:hover,
        .content-quest a:hover,
        .content-loc a:hover,
        .content-desc a:hover {
            color: #f7e4a4;
            border-bottom-color: rgba(247, 228, 164, 0.8);
            box-shadow: inset 0 -1px 0 rgba(247, 228, 164, 0.35);
            background-color: rgba(201, 169, 92, 0.08);
        }
        
        .elegant-disclaimer {
            margin: 32px auto 18px;
            padding: 18px 20px;
            max-width: 1100px;
            border-top: 1px solid rgba(255,255,255,.12);
            color: rgba(255,255,255,.72);
            text-align: center;
            font-size: 13px;
            line-height: 1.7;
        }
        
        .elegant-disclaimer p {
            margin: 0;
        }
        
        .elegant-disclaimer p + p {
            margin-top: 6px;
        }
        
        .elegant-disclaimer a {
            color: rgba(255,255,255,.78);
            text-decoration: none;
        }
        
        .elegant-disclaimer a:hover {
            text-decoration: underline;
        }

        body.modal-open {
            overflow: hidden;
        }

        .changelog-modal[hidden] {
            display: none;
        }

        .changelog-modal {
            position: fixed;
            inset: 0;
            background: rgba(3, 7, 18, 0.78);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .changelog-dialog {
            width: min(760px, 100%);
            max-height: 85vh;
            overflow: auto;
            background: linear-gradient(180deg, rgba(22, 28, 39, 0.98), rgba(15, 19, 25, 0.98));
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: var(--shadow);
        }

        .changelog-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 1.4rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .changelog-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
        }

        .changelog-subtitle {
            color: var(--text-muted);
            font-size: 0.86rem;
            margin-top: 0.2rem;
        }

        .changelog-close {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        .changelog-content {
            padding: 1.1rem 1.4rem 1.4rem;
            display: grid;
            gap: 0.9rem;
        }

        .changelog-entry {
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            padding: 1rem 1.05rem;
        }

        .changelog-entry-head {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: baseline;
            margin-bottom: 0.65rem;
            flex-wrap: wrap;
        }

        .changelog-version {
            color: #f8d77b;
            font-weight: 700;
        }

        .changelog-date {
            color: var(--text-muted);
            font-size: 0.84rem;
        }

        .changelog-summary {
            color: #dbe6f3;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .changelog-list {
            margin: 0;
            padding-left: 1rem;
            color: var(--text-muted);
        }

        /* Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes checkmark { 0% { opacity: 0; } 100% { opacity: 1; } }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .page-shell { grid-template-columns: 1fr; }
            .sidebar { position: static; }
            .checklist { grid-template-columns: 1fr; }
            .controls { grid-template-columns: 1fr; }
            .btn-group { flex-wrap: wrap; }
            .changelog-btn { position: static; margin-top: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <aside class="sidebar">
            <div class="sidebar-head">
                <div class="sidebar-title">Guides</div>
            </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link active">
                <span class="sidebar-link-title">Main Checklist</span>
                <span class="sidebar-link-copy">Unlock Checklist</span>
            </a>
            <a href="aether-currents-guide.html" class="sidebar-link">
                <span class="sidebar-link-title">Aether Currents Guide</span>
                <span class="sidebar-link-copy">Unlock flying on expansion maps.</span>
            </a>
            <a href="weekly-content-guide.html" class="sidebar-link">
                <span class="sidebar-link-title">Weekly Content Guide</span>
                <span class="sidebar-link-copy">Weekly Routine</span>
            </a>
        </nav>
    </aside>
    <div class="container">
        <header>
            <h1>FFXIV Content Unlock Checklist</h1>
            <div class="header-subtitle">Everything you need to play in one place</div>
            <button id="open-changelog-btn" class="changelog-btn" type="button">Changelog</button>
        </header>

        <div class="progress-container">
            <div class="progress-header">
                <span>Overall Progress</span>
                <span id="progress-text">0 / 0 (0%)</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar"></div>
            </div>
        </div>

        <div class="controls">
            <div class="search-box-wrap">
                <input type="text" id="search-input" class="search-box" placeholder="Search quests, unlocks, currents, tails, locations..." onchange="filterItems()" onkeyup="filterItems()">
                <button id="clear-search-btn" class="search-clear-btn" type="button" onclick="clearSearch()" hidden aria-label="Clear search">x</button>
            </div>
            <select id="type-filter" class="search-box" onchange="filterItems()">
                <option value="">All types</option>
            </select>
            <div class="btn-group">
                <button id="toggle-completed-btn" onclick="toggleCompletedVisibility()">Show Completed</button>
                <button onclick="expandAll()">Expand All</button>
                <button onclick="collapseAll()">Collapse All</button>
                <button onclick="resetProgress()" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.3)">Reset</button>
            </div>
        </div>

        <div id="checklist-container">
            <!-- Rendered via JS -->
        </div>
        
    </div>

    <div id="changelog-modal" class="changelog-modal" hidden>
        <div class="changelog-dialog">
            <div class="changelog-header">
                <div>
                    <div class="changelog-title">Changelog</div>
                    <div class="changelog-subtitle">Versions and site changes</div>
                </div>
                <button id="close-changelog-btn" class="changelog-close" type="button">Close</button>
            </div>
            <div id="changelog-content" class="changelog-content"></div>
        </div>
    </div>
    </div>

    <script src="index-app.js"></script>
</body>
</html>
