<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFXIV Content Unlock Checklist</title>
    <style>
        :root {
            --primary: #c9a95c;
            --primary-hover: #e8cca4;
            --bg-dark: #0f1319;
            --bg-panel: rgba(25, 32, 43, 0.7);
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(201, 169, 92, 0.3);
            --accent: #4f46e5;
            --glass-bg: rgba(15, 19, 25, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #090a0f 0%, #1a1b26 100%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            line-height: 1.6;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(201, 169, 92, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease-out;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(201, 169, 92, 0.2);
            font-weight: 700;
        }

        .profile-badge {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .profile-badge .strong-name {
            color: white;
            font-weight: 600;
        }

        .profile-badge a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .profile-badge a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .progress-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            animation: fadeIn 1s ease-out;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .progress-bar-bg {
            height: 12px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-hover));
            width: 0%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(201, 169, 92, 0.5);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        select.search-box {
            flex: initial;
            min-width: 150px;
            cursor: pointer;
        }
        
        select.search-box option {
            background: #1a1b26;
            color: white;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(201, 169, 92, 0.2);
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }

        button:hover {
            background: rgba(201, 169, 92, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .category {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.8s ease-out backwards;
        }

        .category:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(201, 169, 92, 0.2);
        }

        .category-header {
            background: rgba(201, 169, 92, 0.05);
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease;
        }

        .category-header:hover {
            background: rgba(201, 169, 92, 0.1);
        }

        .category-title {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 600;
        }

        .category-stats {
            color: var(--text-muted);
            font-size: 0.9rem;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .checklist {
            padding: 0;
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1px;
            background: var(--glass-border);
        }

        .checklist-item {
            background: var(--bg-panel);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .checklist-item:hover {
            background: rgba(25, 32, 43, 0.9);
        }

        .checklist-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform 0.2s ease;
        }

        .checklist-item.completed {
            background: rgba(201, 169, 92, 0.03);
            opacity: 0.6;
        }

        .checklist-item.completed::before {
            transform: scaleY(1);
            background: #10b981;
        }

        .checkbox-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            padding-top: 3px;
        }

        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            flex-shrink: 0;
        }

        input[type="checkbox"]:checked {
            background: #10b981;
            border-color: #10b981;
        }

        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 6px;
            height: 11px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            animation: checkmark 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        input[type="checkbox"]:hover {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(201, 169, 92, 0.3);
        }

        .content-info {
            flex: 1;
            min-width: 0;
        }

        .content-name {
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.4rem;
            transition: color 0.2s ease;
            display: block;
            font-size: 1.05rem;
        }

        .checklist-item.completed .content-name {
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: rgba(255,255,255,0.2);
        }

        .badges {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            color: #ddd;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.type { background: rgba(79, 70, 229, 0.2); color: #a5b4fc; border: 1px solid rgba(79, 70, 229, 0.3); }
        .badge.ilvl { background: rgba(201, 169, 92, 0.15); color: #fde68a; border: 1px solid rgba(201, 169, 92, 0.3); }

        .content-quest {
            font-size: 0.85rem;
            color: var(--primary);
            opacity: 0.9;
            margin-bottom: 4px;
        }

        .content-loc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        
        .content-desc {
            font-size: 0.8rem;
            color: #718096;
            margin-top: 4px;
            line-height: 1.4;
        }
        
        .elegant-disclaimer {
            margin: 32px auto 18px;
            padding: 18px 20px;
            max-width: 1100px;
            border-top: 1px solid rgba(255,255,255,.12);
            color: rgba(255,255,255,.72);
            text-align: center;
            font-size: 13px;
            line-height: 1.7;
        }
        
        .elegant-disclaimer p {
            margin: 0;
        }
        
        .elegant-disclaimer p + p {
            margin-top: 6px;
        }
        
        .elegant-disclaimer a {
            color: rgba(255,255,255,.78);
            text-decoration: none;
        }
        
        .elegant-disclaimer a:hover {
            text-decoration: underline;
        }

        /* Loading overlay */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 19, 25, 0.9);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--primary);
            font-size: 1.5rem;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(201, 169, 92, 0.3);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes checkmark { 0% { opacity: 0; } 100% { opacity: 1; } }

        @media (max-width: 768px) {
            body { padding: 1rem; }
            .checklist { grid-template-columns: 1fr; }
            .controls { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div>Carregando progresso do servidor...</div>
    </div>

    <div class="container">
        <header>
            <h1>FFXIV Content Unlock Checklist</h1>
            <div class="profile-badge">
                👤 <span class="strong-name" id="user-display">Loading...</span> 
                <a href="#" onclick="changeUser()">[Trocar Personagem]</a>
            </div>
        </header>

        <div class="progress-container">
            <div class="progress-header">

            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar"></div>

        </div>

        <div class="controls">
            <input type="text" id="search-input" class="search-box" placeholder="Search quests, unlocks, locations..." onchange="filterItems()" onkeyup="filterItems()">
            <select id="type-filter" class="search-box" onchange="filterItems()">
                <option value="">All types</option>
            </select>
            <div class="btn-group">
                <button onclick="expandAll()">Expand All</button>
                <button onclick="collapseAll()">Collapse All</button>
                <button onclick="resetProgress()" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.3)">Reset</button>
            </div>
        </div>

        <div id="checklist-container">
            <!-- Rendered via JS -->
        </div>
        
        <footer class="elegant-disclaimer">
            <p>Crafted with care using <em>Content Unlock</em> from the FFXIV Console Games Wiki as its primary reference.</p>
            <p><a href="https://ffxiv.consolegameswiki.com/wiki/Content_Unlock" target="_blank" rel="noopener noreferrer">https://ffxiv.consolegameswiki.com/wiki/Content_Unlock</a></p>
        </footer>
    </div>

ep Dungeon", "quest": "-", "location": "(29.9,6.0: Il Mheg)", "information": "Talk to Vanthau after reaching stone 99 of Pilgrim's Traverse.", "raw": "Level 91 - 100 | 91 | The Final Verse | Deep Dungeon | - | (29.9,6.0: Il Mheg) | Talk to Vanthau after reaching stone 99 of Pilgrim's Traverse.", "id": "Level 91 - 100|91|The Final Verse|-", "primary": "The Final Verse", "secondary_unlock": ""}];
        
        // Group data by section and collect types
        const groupedData = [];
        const sectionsMap = new Map();
        const types = new Set();
        
        function sectionOrderValue(section){
            const order=[
                "Level 1 - 50",
                "Level 50",
                "Level 51 - 60",
                "Level 60",
                "Level 61 - 70",
                "Level 70",
                "Level 71 - 80",
                "Level 80",
                "Level 81 - 90",
                "Level 90",
                "Level 91 - 100",
                "Level 100"
            ];
            const idx=order.indexOf(section);
            return idx === -1 ? 999 : idx;
        }
        
        DATA.forEach(item => {
            if (!sectionsMap.has(item.section)) {
                const newSection = { id: item.section.replace(/\W+/g, '_').toLowerCase(), title: item.section, items: [] };
                sectionsMap.set(item.section, newSection);
                groupedData.push(newSection);
            }
            if (item.type) types.add(item.type);
            item.cleanId = item.id.replace(/\W+/g, '_') + Math.random().toString(36).substr(2, 5);
            sectionsMap.get(item.section).items.push(item);
        });
        
        groupedData.sort((a, b) => sectionOrderValue(a.title) - sectionOrderValue(b.title));

        let savedState = {};
        let currentUser = localStorage.getItem('ffxiv_checklist_user');

        function initProfile() {
            if (!currentUser) {
                let input = prompt('Bem-vindo! Qual o seu Nome de Personagem ou Username? (Apenas letras e números)');
                if (input && input.trim() !== '') {
                    currentUser = input.replace(/[^a-zA-Z0-9_\- ]/g, '').trim();
                } else {
                    currentUser = 'Guest';
                }
                localStorage.setItem('ffxiv_checklist_user', currentUser);
            }
            document.getElementById('user-display').innerText = currentUser;
        }

        function changeUser() {
            let input = prompt('Trocar para qual personagen? (Deixe em branco para manter o atual)', currentUser);
            if (input && input.trim() !== '') {
                currentUser = input.replace(/[^a-zA-Z0-9_\- ]/g, '').trim();
                localStorage.setItem('ffxiv_checklist_user', currentUser);
                // Restart checklist with new user
                document.getElementById('loading-overlay').style.display = 'flex';
                document.getElementById('user-display').innerText = currentUser;
                fetchProgress();
            }
        }

        async function fetchProgress() {
            try {
                const res = await fetch(`/api/progress?user=${encodeURIComponent(currentUser)}`);
                if (res.ok) {
                    savedState = await res.json();
                } else {
                    console.log("Servidor não retornou OK. Usando cache local.");
                    savedState = JSON.parse(localStorage.getItem('ffxiv_checklist_state_'+currentUser)) || {};
                }
            } catch(e) {
                console.warn("Backend API indisponível ou inacessível via /api/. Fallback para LocalStorage.");
                savedState = JSON.parse(localStorage.getItem('ffxiv_checklist_state_'+currentUser)) || {};
            }
            
            // Render everything after loading
            renderChecklist();
            
            // Hide loading
            const loader = document.getElementById('loading-overlay');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }

        let syncTimeout = null;
        function pushProgress() {
            // Always save locally immediately just in case
            localStorage.setItem('ffxiv_checklist_state_'+currentUser, JSON.stringify(savedState));
            
            // Debounce the fetch so we don't spam the server on multiple quick clicks
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(async () => {
                try {
                    // Sync silently
                    await fetch(`/api/progress?user=${encodeURIComponent(currentUser)}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(savedState)
                    });
                } catch (e) {
                    console.error("Falha ao salvar no servidor em background:", e);
                }
            }, 1000);
        }

        function renderChecklist() {
            const container = document.getElementById('checklist-container');
            container.innerHTML = '';
            
            const typeFilter = document.getElementById('type-filter');
            if(typeFilter.options.length === 1) {
                Array.from(types).sort().forEach(type => {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    typeFilter.appendChild(option);
                });
            }

            groupedData.forEach((category, idx) => {
                const completedCount = category.items.filter(item => savedState[item.id]).length;
                const totalCount = category.items.length;

                const categoryEl = document.createElement('div');
                categoryEl.className = 'category';
                categoryEl.style.animationDelay = `${(idx%5)*0.1}s`;
                
                let itemsHtml = category.items.map(item => {
                    let badgesHtml = '';
                    if (item.type) badgesHtml += `<span class="badge type">${item.type}</span>`;
                    if (item.ilevel && item.ilevel !== '-') badgesHtml += `<span class="badge ilvl">iLvl ${item.ilevel}</span>`;
                    
                    let titleText = item.quest || item.unlock;
                    let descText = (item.quest && item.quest !== item.unlock) ? item.unlock : '';
                    if (!descText && item.secondary_unlock) descText = item.secondary_unlock;
                    
                    let unlockHtml = descText ? `<div class="content-quest">🎁 ${descText}</div>` : '';
                    let locHtml = item.location ? `<div class="content-loc">📍 ${item.location}</div>` : '';
                    let infoHtml = item.information ? `<div class="content-desc">${item.information}</div>` : '';

                    return `
                        <li class="checklist-item ${savedState[item.id] ? 'completed' : ''}" id="item-${item.cleanId}" data-search="${(item.unlock+' '+item.quest+' '+item.location+' '+item.type).toLowerCase()}" data-type="${item.type || ''}">
                            <div class="checkbox-wrapper">
                                <input type="checkbox" 
                                       id="check-${item.cleanId}" 
                                       ${savedState[item.id] ? 'checked' : ''} 
                                       onchange="toggleItem('${category.id}', '${item.id}', '${item.cleanId}')">
                            </div>
                            <div class="content-info">
                                <label class="content-name" for="check-${item.cleanId}">${titleText}</label>
                                <div class="badges">${badgesHtml}</div>
                                ${unlockHtml}
                                ${locHtml}
                                ${infoHtml}
                            </div>
                        </li>
                    `;
                }).join('');

                categoryEl.innerHTML = `
                    <div class="category-header" onclick="toggleCategory('${category.id}')">
                        <div class="category-title">${category.title}</div>
                        <div class="category-stats" id="stats-${category.id}">
                            ${completedCount} / ${totalCount}
                        </div>
                    </div>
                    <ul class="checklist" id="list-${category.id}">
                        ${itemsHtml}
                    </ul>
                `;
                container.appendChild(categoryEl);
            });

            updateMainProgress();
        }

        function toggleItem(categoryId, originalId, cleanId) {
            const checkbox = document.getElementById('check-'+cleanId);
            const itemEl = document.getElementById('item-'+cleanId);
            
            savedState[originalId] = checkbox.checked;
            
            // Push changes to native localstorage and to backend
            pushProgress();
            
            if (checkbox.checked) itemEl.classList.add('completed');
            else itemEl.classList.remove('completed');

            updateCategoryStats(categoryId);
            updateMainProgress();
        }
        
        function updateCategoryStats(categoryId) {
            const category = groupedData.find(c => c.id === categoryId);
            const completedCount = category.items.filter(i => savedState[i.id]).length;
            const statsEl = document.getElementById(`stats-${categoryId}`);
            if (statsEl) {
                statsEl.innerText = `${completedCount} / ${category.items.length}`;
            }
        }

        function updateMainProgress() {
            let totalItems = 0;
            let completedItems = 0;

            groupedData.forEach(category => {
                totalItems += category.items.length;
                completedItems += category.items.filter(i => savedState[i.id]).length;
            });

            const percentage = totalItems === 0 ? 0 : Math.round((completedItems / totalItems) * 100);
            
            document.getElementById('progress-text').innerText = `${completedItems} / ${totalItems} (${percentage}%)`;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function toggleCategory(categoryId) {
            const list = document.getElementById(`list-${categoryId}`);
            list.style.display = list.style.display === 'none' ? 'grid' : 'none';
        }

        function expandAll() { groupedData.forEach(c => document.getElementById(`list-${c.id}`).style.display = 'grid'); }
        function collapseAll() { groupedData.forEach(c => document.getElementById(`list-${c.id}`).style.display = 'none'); }

        function resetProgress() {
            if (confirm('Tem certeza que deseja apagar todo o progresso atual deste perfil?')) {
                savedState = {};
                pushProgress(); // Will sync empty state to backend
                renderChecklist();
            }
        }

        function filterItems() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const typeTerm = document.getElementById('type-filter').value;
            
            document.querySelectorAll('.checklist-item').forEach(el => {
                const matchesSearch = el.dataset.search.includes(searchTerm);
                const matchesType = !typeTerm || el.dataset.type === typeTerm;
                el.style.display = (matchesSearch && matchesType) ? 'flex' : 'none';
            });
            
            groupedData.forEach(category => {
                const list = document.getElementById(`list-${category.id}`);
                let hasVisible = false;
                Array.from(list.children).forEach(li => {
                    if (li.style.display !== 'none') hasVisible = true;
                });
                const catEl = list.parentElement;
                catEl.style.display = hasVisible ? 'block' : 'none';
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initProfile();
            fetchProgress();
        });
    </script>
</body>
</html>
